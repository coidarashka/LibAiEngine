name: Test AiEngine .so (GoogleTest)

on:
  workflow_dispatch: # Позволяет запускать вручную по кнопке "Run workflow"

env:
  NDK_VERSION: r26b

jobs:
  test:
    runs-on: macos-latest # Используем самый актуальный и стабильный macOS runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        run: brew install cmake ninja

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-darwin.zip
          unzip -q android-ndk-${NDK_VERSION}-darwin.zip
          echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV

      # Автоматически скачивает артефакт из ПОСЛЕДНЕЙ успешной сборки build-release.yml
      - name: Download Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: build-release.yml # Убедитесь, что имя файла совпадает с вашим workflow сборки
          workflow_conclusion: success
          name: libAiEngine-arm64-v8a
          path: downloaded_artifact

      - name: Prepare Test Build
        run: |
          cd downloaded_artifact
          unzip libAiEngine-arm64-v8a.zip
          mkdir -p ../tests
          cp libAiEngine.so ../tests/

      - name: Build GoogleTest Executable
        run: |
          mkdir -p tests/build && cd tests/build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -GNinja
          ninja run_tests

      - name: Run Tests in Android Emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: arm64-v8a
          profile: Nexus 6
          disable-animations: true
          script: |
            echo "Pushing test executable and library to device..."
            adb push tests/build/run_tests /data/local/tmp/
            adb push tests/libAiEngine.so /data/local/tmp/
            
            echo "Setting permissions..."
            adb shell "chmod +x /data/local/tmp/run_tests"
            
            echo "Running GoogleTest..."
            adb shell "cd /data/local/tmp && LD_LIBRARY_PATH=. ./run_tests"
